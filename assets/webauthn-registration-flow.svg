<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none" font-family="Arial, sans-serif">
<defs>
<marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#333"/></marker>
</defs>
<rect x="20" y="22" width="1160" height="720" rx="24" fill="#e5e7eb"/>
<rect x="16" y="16" width="1160" height="720" rx="24" fill="#fff" stroke="#d0d7de"/>
<text x="596" y="54" text-anchor="middle" font-size="26" font-weight="700" fill="#111">WebAuthn Registration Ceremony</text>
<text x="596" y="79" text-anchor="middle" font-size="14" fill="#555">Node server, browser, and authenticator each do a different job</text>

<rect x="48" y="118" width="330" height="560" rx="20" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="213" y="153" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Browser app</text>

<rect x="435" y="118" width="330" height="560" rx="20" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="600" y="153" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Node.js server</text>

<rect x="822" y="118" width="330" height="560" rx="20" fill="#f6f8fa" stroke="#d0d7de"/>
<text x="987" y="153" text-anchor="middle" font-size="20" font-weight="700" fill="#111">Authenticator</text>

<rect x="84" y="194" width="258" height="84" rx="14" fill="#dbeafe" stroke="#d0d7de"/>
<text x="213" y="225" text-anchor="middle" font-size="16" font-weight="700" fill="#111">1. Request options</text>
<text x="213" y="247" text-anchor="middle" font-size="14" fill="#555">POST /auth/register/options</text>

<rect x="471" y="194" width="258" height="84" rx="14" fill="#dcfce7" stroke="#d0d7de"/>
<text x="600" y="225" text-anchor="middle" font-size="16" font-weight="700" fill="#111">2. Generate challenge</text>
<text x="600" y="247" text-anchor="middle" font-size="14" fill="#555">Return registration options JSON</text>

<rect x="84" y="318" width="258" height="84" rx="14" fill="#e9d5ff" stroke="#d0d7de"/>
<text x="213" y="349" text-anchor="middle" font-size="16" font-weight="700" fill="#111">3. Start registration</text>
<text x="213" y="371" text-anchor="middle" font-size="14" fill="#555">Browser calls startRegistration()</text>

<rect x="858" y="318" width="258" height="84" rx="14" fill="#fef9c3" stroke="#d0d7de"/>
<text x="987" y="349" text-anchor="middle" font-size="16" font-weight="700" fill="#111">4. Create key pair</text>
<text x="987" y="371" text-anchor="middle" font-size="14" fill="#555">Biometric or key touch prompt</text>

<rect x="84" y="442" width="258" height="84" rx="14" fill="#ffedd5" stroke="#d0d7de"/>
<text x="213" y="473" text-anchor="middle" font-size="16" font-weight="700" fill="#111">5. Send attestation</text>
<text x="213" y="495" text-anchor="middle" font-size="14" fill="#555">POST /auth/register/verify</text>

<rect x="471" y="442" width="258" height="118" rx="14" fill="#fce7f3" stroke="#d0d7de"/>
<text x="600" y="473" text-anchor="middle" font-size="16" font-weight="700" fill="#111">6. Verify and store</text>
<text x="600" y="495" text-anchor="middle" font-size="14" fill="#555">Check challenge, origin, RP ID</text>
<text x="600" y="517" text-anchor="middle" font-size="14" fill="#555">Save credential ID, public key, counter</text>
<text x="600" y="539" text-anchor="middle" font-size="14" fill="#555">Store device type and backup state</text>

<line x1="342" y1="236" x2="471" y2="236" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
<line x1="600" y1="278" x2="600" y2="300" stroke="#333" stroke-width="2"/>
<line x1="729" y1="236" x2="782" y2="236" stroke="#333" stroke-width="2"/>
<path d="M782 236V360H858" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
<line x1="858" y1="360" x2="342" y2="360" stroke="#333" stroke-width="2" marker-end="url(#a)"/>
<path d="M342 484H471" stroke="#333" stroke-width="2" marker-end="url(#a)"/>

<rect x="471" y="592" width="258" height="56" rx="14" fill="#dbeafe" stroke="#d0d7de"/>
<text x="600" y="626" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Result: user now owns a passkey</text>
</svg>